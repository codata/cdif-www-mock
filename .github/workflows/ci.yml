name: Validation Check

on:
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate Content & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify Build
        run: npm run build

      - name: Success Message
        if: success()
        run: echo "Validation successful! Content is safe to merge."